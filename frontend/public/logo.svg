<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="aurora" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00c6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0072ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="roof" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9966;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff5e62;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle (Sun/Moon/Planet) -->
  <circle cx="256" cy="256" r="240" fill="url(#aurora)" opacity="0.1" />

  <!-- House Structure -->
  <path d="M256 64 L448 224 V448 H64 V224 Z" fill="none" stroke="url(#aurora)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Aurora Waves -->
  <path d="M64 224 Q256 128 448 224" fill="none" stroke="url(#roof)" stroke-width="24" stroke-linecap="round"/>
  
  <!-- Inner Details (Window/Door) -->
  <rect x="192" y="320" width="128" height="128" rx="16" fill="url(#aurora)" opacity="0.8"/>
  <rect x="256" y="80" width="0" height="0" /> <!-- Hidden anchor -->

  <!-- Star Accents -->
  <circle cx="380" cy="120" r="12" fill="#FFD700" />
  <circle cx="100" cy="150" r="8" fill="#FFD700" />
</svg>
